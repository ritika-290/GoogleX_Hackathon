<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup India Advisor | AI-Powered Location Intelligence</title>
    <script src="https://maps.googleapis.com/maps/api/js?key={{ maps_api_key }}&libraries=places,marker,geometry"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #f3f4f6;
            --accent: #10b981;
            --background: #f9fafb;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-md: 0.5rem;
            --radius-lg: 1rem;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background-color: var(--background); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar Container */
        .sidebar {
            width: 450px;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            z-index: 10;
            height: 100%;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(to right, #ffffff, #f8fafc);
        }

        .sidebar-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sidebar-header p {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            position: relative;
        }

        /* Wizard Form Styles */
        .wizard-step {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .wizard-step.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            position: relative;
        }
        
        .step-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--border);
            z-index: 1;
            transform: translateY(-50%);
        }

        .step-dot {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: var(--card-bg);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--text-muted);
            z-index: 2;
            transition: all 0.3s ease;
        }

        .step-dot.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
        }
        .step-dot.completed {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }
        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            transition: all 0.2s ease;
            background-color: var(--background);
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background-color: var(--card-bg);
        }

        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 0.75rem;
            background: var(--background);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .toggle-group:hover { border-color: var(--primary); }
        .toggle-group input[type="checkbox"] { width: 1.25rem; height: 1.25rem; accent-color: var(--primary); cursor: pointer; }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .btn-secondary { background: var(--secondary); color: var(--text-main); }
        .btn-secondary:hover { background: #e5e7eb; }
        .btn-block { width: 100%; }

        .wizard-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            gap: 1rem;
        }

        /* Progress Tracker */
        #progressContainer { display: none; text-align: center; padding: 2rem 0; }
        .spinner {
            width: 3rem;
            height: 3rem;
            border: 4px solid var(--secondary);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-bar-bg {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin: 1.5rem 0;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Results Panel */
        #resultsPanel { display: none; }
        .result-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }
        .result-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .rank-badge {
            position: absolute;
            top: -12px;
            left: -12px;
            background: var(--primary);
            color: white;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            box-shadow: var(--shadow-sm);
        }
        .result-header h3 { font-size: 1.125rem; color: var(--primary-dark); margin-bottom: 0.25rem; }
        .result-header p { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1rem; }
        
        .score-pill {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            background: #dcfce7;
            color: #166534;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.8125rem;
        }
        .info-item { display: flex; flex-direction: column; }
        .info-label { color: var(--text-muted); font-weight: 500; }
        .info-value { color: var(--text-main); font-weight: 600; }

        .ai-summary {
            background: linear-gradient(to right bottom, #eff6ff, #f8fafc);
            border: 1px solid #bfdbfe;
            border-radius: var(--radius-md);
            padding: 1rem;
            margin-top: 1rem;
            font-size: 0.875rem;
            line-height: 1.5;
            color: #1e3a8a;
        }
        .ai-summary-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .subsidy-box {
            background: var(--accent);
            color: white;
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .subsidy-box .amount { font-size: 1.25rem; font-weight: 700; }
        .subsidy-box .label { font-size: 0.75rem; opacity: 0.9; }

        /* Map Container */
        .map-container { flex: 1; position: relative; background: #e5e7eb; }
        #map { width: 100%; height: 100%; }

        /* Custom Map Info Window */
        .gm-style .gm-style-iw-c { padding: 0 !important; border-radius: var(--radius-lg) !important; box-shadow: var(--shadow-lg) !important; }
        .gm-style .gm-style-iw-d { overflow: hidden !important; }
        .map-info-window { padding: 1rem; min-width: 250px; }
        .map-info-window h4 { color: var(--primary); margin-bottom: 0.5rem; font-size: 1rem; }
        .map-info-window p { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem; }

    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>🚀 Startup India Advisor</h1>
            <p>Multi-Agent Industrial Park Recommendation</p>
        </div>

        <div class="sidebar-content">
            <!-- WIZARD FORM -->
            <form id="advisorForm">
                <div class="step-indicator" id="stepIndicator">
                    <div class="step-dot active" data-step="1">1</div>
                    <div class="step-dot" data-step="2">2</div>
                    <div class="step-dot" data-step="3">3</div>
                </div>

                <!-- Step 1: Core Business -->
                <div class="wizard-step active" id="step1">
                    <h2 style="margin-bottom: 1.5rem; font-size: 1.25rem;">Core Requirements</h2>
                    
                    <div class="form-group">
                        <label>Business Sector</label>
                        <select id="sector" required>
                            <option value="">Select sector...</option>
                            <option value="manufacturing">General Manufacturing</option>
                            <option value="electronics">Electronics Hardware</option>
                            <option value="automobile">Automobile & Auto Components</option>
                            <option value="pharma">Pharmaceuticals</option>
                            <option value="textile">Textiles & Apparel</option>
                            <option value="food_processing">Food Processing</option>
                            <option value="IT">IT & ITeS</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Investment Size (₹)</label>
                        <input type="number" id="investment" placeholder="e.g., 50000000" required min="100000">
                    </div>

                    <div class="form-group">
                        <label>Land Required (Acres)</label>
                        <input type="number" id="land_required" placeholder="e.g., 5" required min="0.1" step="0.1">
                    </div>

                    <div class="form-group">
                        <label>Preferred State (Optional)</label>
                        <select id="state">
                            <option value="">Any State</option>
                            <option value="GUJARAT">Gujarat</option>
                            <option value="MAHARASHTRA">Maharashtra</option>
                            <option value="KARNATAKA">Karnataka</option>
                            <option value="TAMIL NADU">Tamil Nadu</option>
                            <option value="TELANGANA">Telangana</option>
                            <option value="UTTAR PRADESH">Uttar Pradesh</option>
                            <option value="WEST BENGAL">West Bengal</option>
                            <option value="UTTARAKHAND">Uttarakhand</option>
                        </select>
                    </div>

                    <div class="wizard-actions" style="justify-content: flex-end;">
                        <button type="button" class="btn btn-primary" onclick="nextStep(2)">Next Step →</button>
                    </div>
                </div>

                <!-- Step 2: Infrastructure Needs -->
                <div class="wizard-step" id="step2">
                    <h2 style="margin-bottom: 1.5rem; font-size: 1.25rem;">Infrastructure & Logistics</h2>
                    
                    <label class="toggle-group">
                        <div>
                            <div style="font-weight: 600;">Logistics Connectivity</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">Proximity to highways, railways, or ports</div>
                        </div>
                        <input type="checkbox" id="req_logistics">
                    </label>

                    <label class="toggle-group">
                        <div>
                            <div style="font-weight: 600;">Water Availability</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">Dedicated water supply crucial for operations</div>
                        </div>
                        <input type="checkbox" id="req_water">
                    </label>

                    <label class="toggle-group">
                        <div>
                            <div style="font-weight: 600;">Skilled Labor</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">Access to local skilled workforce</div>
                        </div>
                        <input type="checkbox" id="req_labor">
                    </label>
                    
                    <label class="toggle-group">
                        <div>
                            <div style="font-weight: 600;">Plug & Play Facility</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">Ready-to-use sheds or infrastructure</div>
                        </div>
                        <input type="checkbox" id="req_plug_play">
                    </label>

                    <div class="wizard-actions">
                        <button type="button" class="btn btn-secondary" onclick="nextStep(1)">← Back</button>
                        <button type="button" class="btn btn-primary" onclick="nextStep(3)">Next Step →</button>
                    </div>
                </div>

                <!-- Step 3: Business Profile -->
                <div class="wizard-step" id="step3">
                    <h2 style="margin-bottom: 1.5rem; font-size: 1.25rem;">Business Profile</h2>
                    
                    <div class="form-group">
                        <label>Expected Employment</label>
                        <input type="number" id="employment" placeholder="Number of employees" min="1">
                    </div>

                    <label class="toggle-group">
                        <div>
                            <div style="font-weight: 600;">DPIIT-Recognized Startup</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">Registered with Startup India</div>
                        </div>
                        <input type="checkbox" id="is_startup">
                    </label>

                    <label class="toggle-group">
                        <div>
                            <div style="font-weight: 600;">MSME Registered</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">Possess Udyam Registration</div>
                        </div>
                        <input type="checkbox" id="is_msme">
                    </label>

                    <div class="wizard-actions">
                        <button type="button" class="btn btn-secondary" onclick="nextStep(2)">← Back</button>
                        <button type="submit" class="btn btn-primary" style="background: var(--accent);">🚀 Find Top Parks</button>
                    </div>
                </div>
            </form>

            <!-- PROGRESS TRACKER -->
            <div id="progressContainer">
                <div class="spinner"></div>
                <h3 id="progressStepName" style="color: var(--primary); margin-bottom: 0.5rem;">Initializing...</h3>
                <p id="progressMsg" style="font-size: 0.875rem; color: var(--text-muted);">Connecting to agents</p>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
                <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 1rem;">
                    Our AI is searching 4,200+ parks, scraping live data, and calculating government subsidies...
                </p>
            </div>

            <!-- RESULTS LIST -->
            <div id="resultsPanel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="font-size: 1.25rem; font-weight: 700;">Top 10 Recommendations</h2>
                    <button class="btn btn-secondary" style="padding: 0.5rem 1rem;" onclick="resetForm()">Start Over</button>
                </div>
                <div id="resultsList"></div>
            </div>

        </div>
    </div>

    <!-- MAP CONTAINER -->
    <div class="map-container">
        <div id="map"></div>
    </div>

    <script>
        let map;
        let markers = [];
        let infoWindow;

        // --- Initialization ---
        function initMap() {
            // Default center of India
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 20.5937, lng: 78.9629 },
                zoom: 5,
                styles: [
                    { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] },
                    { featureType: "transit", elementType: "labels", stylers: [{ visibility: "off" }] }
                ]
            });
            infoWindow = new google.maps.InfoWindow();
        }

        window.onload = initMap;

        // --- Wizard Navigation ---
        function nextStep(stepNum) {
            document.querySelectorAll('.wizard-step').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.step-dot').forEach(el => {
                let s = parseInt(el.dataset.step);
                if (s < stepNum) {
                    el.classList.add('completed');
                    el.classList.remove('active');
                } else if (s === stepNum) {
                    el.classList.add('active');
                    el.classList.remove('completed');
                } else {
                    el.classList.remove('active', 'completed');
                }
            });
            document.getElementById(`step${stepNum}`).classList.add('active');
        }

        function resetForm() {
            document.getElementById('advisorForm').reset();
            document.getElementById('advisorForm').style.display = 'block';
            document.getElementById('resultsPanel').style.display = 'none';
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('stepIndicator').style.display = 'flex';
            nextStep(1);
            clearMarkers();
            map.setCenter({ lat: 20.5937, lng: 78.9629 });
            map.setZoom(5);
        }

        // --- Pipeline Execution ---
        document.getElementById('advisorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Gather Requirements
            const reqs = {
                sector: document.getElementById('sector').value,
                investment_inr: parseFloat(document.getElementById('investment').value),
                land_required_acres: parseFloat(document.getElementById('land_required').value),
                preferred_state: document.getElementById('state').value,
                logistics_required: document.getElementById('req_logistics').checked,
                water_required: document.getElementById('req_water').checked,
                labor_required: document.getElementById('req_labor').checked,
                plug_and_play: document.getElementById('req_plug_play').checked,
                employment: parseInt(document.getElementById('employment').value) || 0,
                is_startup: document.getElementById('is_startup').checked,
                is_msme: document.getElementById('is_msme').checked,
                max_results: 15 // Limit for speed
            };

            // Switch UI
            document.getElementById('advisorForm').style.display = 'none';
            document.getElementById('stepIndicator').style.display = 'none';
            document.getElementById('progressContainer').style.display = 'block';
            
            try {
                // Step 2: Query DB
                updateProgress("Querying Database", "Filtering 4,200+ parks...", 10);
                const queryRes = await fetch('/api/find-parks', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(reqs)
                });
                
                const queryData = await queryRes.json();
                if (queryData.status !== 'success' || !queryData.parks || queryData.parks.length === 0) {
                    throw new Error("No matching parks found for these requirements.");
                }

                // Steps 3-6: SSE Pipeline
                const ssePayload = {
                    parks: queryData.parks,
                    requirements: reqs
                };

                const response = await fetch('/api/run-pipeline', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(ssePayload)
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const {value, done} = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.substring(6));
                            
                            let stepName = "";
                            if (data.step === 3) stepName = "Agent Scraping";
                            if (data.step === 4) stepName = "Saving Data";
                            if (data.step === 5) stepName = "AI Ranking & Research";
                            if (data.step === 6) stepName = "Scheme Matching";
                            if (data.step === 7) stepName = "Finalizing";

                            updateProgress(stepName, data.msg, data.pct);

                            if (data.step === 7 && data.results) {
                                renderResults(data.results);
                            }
                        }
                    }
                }

            } catch (err) {
                alert("Error during analysis: " + err.message);
                resetForm();
            }
        });

        function updateProgress(title, msg, pct) {
            document.getElementById('progressStepName').innerText = title;
            document.getElementById('progressMsg').innerText = msg;
            document.getElementById('progressBar').style.width = pct + '%';
        }

        // --- Render Results ---
        function renderResults(parks) {
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('resultsPanel').style.display = 'block';
            
            const list = document.getElementById('resultsList');
            list.innerHTML = '';
            clearMarkers();

            const bounds = new google.maps.LatLngBounds();

            parks.forEach((park, index) => {
                // Determine Map Coordinates
                const lat = park.lat || (20.5937 + (Math.random() - 0.5) * 10);
                const lng = park.lng || (78.9629 + (Math.random() - 0.5) * 10);
                const pos = { lat: parseFloat(lat), lng: parseFloat(lng) };
                
                if (park.lat && park.lng) bounds.extend(pos);

                // Create Map Marker
                const marker = new google.maps.Marker({
                    position: pos,
                    map: map,
                    label: { text: `${index + 1}`, color: "white", fontWeight: "bold" },
                    title: park.name,
                    animation: google.maps.Animation.DROP
                });

                // Marker Click Event
                marker.addListener('click', () => {
                    const content = `
                        <div class="map-info-window">
                            <h4>${park.name}</h4>
                            <p>Score: ${park.rank_score} | Land: ${park.available_area_acres} Acres</p>
                            <p style="margin-bottom:0"><b>Net Inv:</b> ₹${park.schemes?.net_investment_cr || '?'} Cr</p>
                        </div>
                    `;
                    infoWindow.setContent(content);
                    infoWindow.open(map, marker);
                    
                    // Scroll sidebar to card
                    const card = document.getElementById(`card-${index}`);
                    if(card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                });

                markers.push(marker);

                // --- Build Card UI ---
                const r = park.research || {};
                const s = park.schemes || {};
                
                const hw = park.nearest_highway_km ? `${park.nearest_highway_km} km` : 'N/A';
                const air = park.nearest_airport_km ? `${park.nearest_airport_km} km` : 'N/A';

                const card = document.createElement('div');
                card.className = 'result-card';
                card.id = `card-${index}`;
                card.onclick = () => {
                    map.panTo(pos);
                    map.setZoom(10);
                    google.maps.event.trigger(marker, 'click');
                };

                card.innerHTML = `
                    <div class="rank-badge">${index + 1}</div>
                    <div class="result-header">
                        <h3>${park.name}</h3>
                        <p>${park.district}, ${park.state}</p>
                    </div>
                    
                    <div class="score-pill">
                        ★ ${park.rank_score}/100 Score
                    </div>

                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">Available Land</span>
                            <span class="info-value">${park.available_area_acres} Acres</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Sector</span>
                            <span class="info-value" style="text-transform: capitalize;">${park.sector || 'Mixed'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Highway Access</span>
                            <span class="info-value">${hw}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Airport</span>
                            <span class="info-value">${air}</span>
                        </div>
                    </div>

                    ${ (s.central_schemes && s.central_schemes.length > 0) || (s.state_schemes && s.state_schemes.length > 0) ? `
                    <div style="margin-top: 1rem; font-size: 0.8125rem; padding: 1rem; background: linear-gradient(135deg, #f0fdf4, #f8fafc); border-radius: var(--radius-md); border: 1px solid #bbf7d0;">
                        <strong style="color: #166534; display: block; margin-bottom: 0.75rem; font-size: 0.875rem;">🏛️ Government Schemes & Subsidies</strong>
                        
                        ${(s.central_schemes || []).map(sch => `
                        <div style="padding: 0.5rem 0; border-bottom: 1px solid #e5e7eb;">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <div style="flex: 1;">
                                    <span style="background: #dbeafe; color: #1e40af; padding: 0.125rem 0.5rem; border-radius: 4px; font-size: 0.6875rem; font-weight: 600;">CENTRAL</span>
                                    <div style="font-weight: 600; color: var(--text-main); margin-top: 0.25rem;">${sch.name}</div>
                                    <div style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.125rem;">${sch.benefit || ''}</div>
                                    ${sch.url ? `<a href="${sch.url}" target="_blank" rel="noopener" style="color: var(--primary); font-size: 0.75rem; text-decoration: none; display: inline-flex; align-items: center; gap: 0.25rem; margin-top: 0.25rem;">🔗 Apply / Details →</a>` : ''}
                                </div>
                                ${sch.estimated_value_cr ? `<div style="text-align: right; min-width: 70px;"><div style="color: var(--accent); font-weight: 700; font-size: 0.875rem;">₹${sch.estimated_value_cr} Cr</div><div style="color: var(--text-muted); font-size: 0.625rem;">est. subsidy</div></div>` : ''}
                            </div>
                        </div>
                        `).join('')}

                        ${(s.state_schemes || []).map(sch => `
                        <div style="padding: 0.5rem 0; border-bottom: 1px solid #e5e7eb;">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <div style="flex: 1;">
                                    <span style="background: #fef3c7; color: #92400e; padding: 0.125rem 0.5rem; border-radius: 4px; font-size: 0.6875rem; font-weight: 600;">STATE</span>
                                    <div style="font-weight: 600; color: var(--text-main); margin-top: 0.25rem;">${sch.name}</div>
                                    <div style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.125rem;">${sch.benefit || ''}</div>
                                    ${sch.url ? `<a href="${sch.url}" target="_blank" rel="noopener" style="color: var(--primary); font-size: 0.75rem; text-decoration: none; display: inline-flex; align-items: center; gap: 0.25rem; margin-top: 0.25rem;">🔗 Apply / Details →</a>` : ''}
                                </div>
                                ${sch.estimated_value_cr ? `<div style="text-align: right; min-width: 70px;"><div style="color: var(--accent); font-weight: 700; font-size: 0.875rem;">₹${sch.estimated_value_cr} Cr</div><div style="color: var(--text-muted); font-size: 0.625rem;">est. subsidy</div></div>` : ''}
                            </div>
                        </div>
                        `).join('')}

                        ${s.key_insight ? `<div style="margin-top: 0.5rem; font-size: 0.75rem; color: #166534; font-style: italic;">💡 ${s.key_insight}</div>` : ''}
                    </div>
                    ` : ''}

                    ${ s.total_subsidy_cr > 0 ? `
                    <div class="subsidy-box">
                        <div>
                            <div class="label">Total Est. Subsidy (${s.subsidy_pct || '?'}%)</div>
                            <div class="amount">₹${s.total_subsidy_cr} Cr</div>
                        </div>
                        <div style="text-align: right;">
                            <div class="label">Net Investment</div>
                            <div class="amount" style="font-size: 1.125rem;">₹${s.net_investment_cr} Cr</div>
                        </div>
                    </div>
                    ` : ''}

                    <div class="ai-summary">
                        <div class="ai-summary-title">
                            ✨ AI Recommendation
                        </div>
                        ${r.summary_paragraph || 'Strong candidate matching your criteria.'}
                    </div>
                `;

                list.appendChild(card);
            });

            if (!bounds.isEmpty()) {
                map.fitBounds(bounds);
                // Adjust zoom if too close
                const listener = google.maps.event.addListener(map, "idle", function() { 
                    if (map.getZoom() > 10) map.setZoom(10); 
                    google.maps.event.removeListener(listener); 
                });
            }
        }

        function clearMarkers() {
            markers.forEach(m => m.setMap(null));
            markers = [];
        }
    </script>
</body>
</html>
